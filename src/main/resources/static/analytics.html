<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poultry farm | Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/css/dashboard.css">
    
    <script src="/js/api.js" defer></script>
    <script src="/js/chart-service.js" defer></script>
    <script src="/js/app.js" defer></script>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h2>Microclimate analytics</h2>
        <a href="/logout" class="logout-btn">Logout</a>
    </div>

    <div class="time-controls">
        <button class="time-btn active" data-range="8H">8H</button>
        <button class="time-btn" data-range="1D">1D</button>
        <button class="time-btn" data-range="7D">7D</button>
        <button class="time-btn" data-range="1M">1M</button>
        <button class="time-btn" data-range="6M">6M</button>
        <button class="time-btn" data-range="1Y">1Y</button>
        <!-- <button class="time-btn" data-range="MAX">MAX</button> -->
    </div>

    <div id="charts-container"></div>
</div>

</body>
</html>
